// ID: 28001~28099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";
import "role.proto";

// === 通用 ===

message PChatMsg {
    PRolePublic sender = 1;
    string content = 2;
    int64 timestamp = 3;
}

// 频道类型
enum ChannelType {
    CHANNEL_TYPE_UNKNOWN = 0;
    CHANNEL_TYPE_WORLD = 1;
    CHANNEL_TYPE_GUILD = 2;
}

// === 登录初始化 ===

// 聊天初始化 (28001) - 登录时自动调用
message ReqChatInit {
    option (msg_id) = 28001;
}
message RspChatInit {
    option (msg_id) = 28002;
    int32 lobby_id = 1;
    repeated PChatMsg world_messages = 2;
    repeated PChatMsg system_messages = 3;
}

// === 私聊 ===

// 发送私聊 (28008)
message ReqSendPrivateChat {
    option (msg_id) = 28008;
    int64 target_id = 1;
    string content = 2;
}
message RspSendPrivateChat {
    option (msg_id) = 28009;
}

// 拉取私聊历史 (28010)
message ReqPrivateChatHistory {
    option (msg_id) = 28010;
    int64 friend_id = 1;
    int32 count =  2;
}
message RspPrivateChatHistory {
    option (msg_id) = 28011;
    repeated PChatMsg messages = 1;
}

// 私聊消息通知 (28012) - 服务端推送
message NotifyPrivateChat {
    option (msg_id) = 28012;
    PChatMsg message = 1;
}

// === 系统频道 ===

// 拉取系统消息 (28013)
message ReqSystemChatHistory {
    option (msg_id) = 28013;
    int32 count = 1;
}
message RspSystemChatHistory {
    option (msg_id) = 28014;
    repeated PChatMsg messages = 1;
}

// 系统消息通知 (28015) - 服务端推送
message NotifySystemChat {
    option (msg_id) = 28015;
    PChatMsg message = 1;
}

// === 统一频道消息 ===

// 发送频道消息 (28020) - 客户端发送 channel_type + content，channel_id 由服务端推断
message ReqSendChannelChat {
    option (msg_id) = 28020;
    ChannelType channel_type = 1;
    string content           = 2;
}
message RspSendChannelChat {
    option (msg_id) = 28021;
}

// 频道消息通知 (28022) - 服务端推送
message NotifyChannelChat {
    option (msg_id) = 28022;
    ChannelType channel_type = 1;
    int64 channel_id   = 2;
    int64 sender_id    = 3;
    string content     = 4;
    int64 timestamp    = 5;
}

// 拉取频道历史 (28023)
message ReqChannelHistory {
    option (msg_id) = 28023;
    ChannelType channel_type = 1;
    int64 channel_id   = 2;
    int32 count        = 3;
}
message RspChannelHistory {
    option (msg_id) = 28024;
    repeated PChatMsg messages = 1;
}
