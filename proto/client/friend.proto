// ID: 27001~27099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";
import "role.proto";

// 搜索玩家 (27001)
message ReqSearchPlayer {
    option (msg_id) = 27001;
    string name = 1;
}
message RspSearchPlayer {
    option (msg_id) = 27002;
    repeated PPlayerInfo players = 1;
}
message PPlayerInfo {
    PRolePublic player_info = 1;
    int32       relation    = 2;  // 0=自己 1=可申请 2=已申请 3=已是好友
}

// 发送申请 (27003)
message ReqSendRequest {
    option (msg_id) = 27003;
    int64 target_id = 1;
}
message RspSendRequest {
    option (msg_id) = 27004;
}

// 同意申请 (27005)
message ReqAcceptRequest {
    option (msg_id) = 27005;
    int64 from_id = 1;
}
message RspAcceptRequest {
    option (msg_id) = 27006;
}

// 拒绝申请 (27007)
message ReqRejectRequest {
    option (msg_id) = 27007;
    int64 from_id = 1;
}
message RspRejectRequest {
    option (msg_id) = 27008;
}

// 好友列表 (27009)
message ReqFriendList {
    option (msg_id) = 27009;
}
message RspFriendList {
    option (msg_id) = 27010;
    int32 total = 1;
    int32 limit = 2;
    repeated PFriendInfo friends = 3;
}
message PFriendInfo {
    PRolePublic player_info = 1;
    int64       friend_since = 2;
}

// 申请列表 (27011)
message ReqApplyList {
    option (msg_id) = 27011;
}
message RspApplyList {
    option (msg_id) = 27012;
    repeated PApplyInfo incoming = 1;
    repeated PApplyInfo outgoing = 2;
}
message PApplyInfo {
    PRolePublic player_info = 1;
    int64       apply_at    = 2;
    int32       status      = 3;  // 0=待处理 1=已同意 2=已拒绝
}

// 删除好友 (27013)
message ReqRemoveFriend {
    option (msg_id) = 27013;
    int64 target_id = 1;
}
message RspRemoveFriend {
    option (msg_id) = 27014;
}
