// ID: 22001~22099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";

message ReqGMCommand {
    option (msg_id) = 22001;
    string cmd = 1;
}

message RspGMCommand {
    option (msg_id) = 22002;
    string result = 1;
}

message ReqGMHelp {
    option (msg_id) = 22003;
}

message RspGMHelp {
    option (msg_id) = 22004;
    repeated PCmdDoc commands = 1;
}

message PCmdDoc {
    string name = 1;
    string brief = 2;
    string usage = 3;
    string example = 4;
}
