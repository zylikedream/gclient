// ID: 26001~26006
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";
import "bag.proto";

message POrderSlot {
    int32 slot_id = 1;
    int32 position = 2;
    int32 resident_id = 3;
    string resident_name = 4;
    string resident_desc = 5;
    repeated PGoodInfo demands = 6;
    repeated PGoodInfo reward = 7;
    int64 cool_down_end = 8;
}

message PMilestoneInfo {
    int32 id = 1;
    int32 need_count = 2;
    bool claimed = 3;
}

message ReqOrderInfo { option (msg_id) = 26001; }
message RspOrderInfo {
    option (msg_id) = 26002;
    repeated POrderSlot slots = 1;
    int32 completed_count = 2;
    repeated PMilestoneInfo milestones = 3;
}

message ReqSubmitOrder { option (msg_id) = 26003; int32 slot_id = 1; }
message RspSubmitOrder {
    option (msg_id) = 26004;
    POrderSlot slot = 1;
    int32 completed_count = 2;
}

message ReqClaimOrderMilestone { option (msg_id) = 26005; int32 id = 1; }
message RspClaimOrderMilestone { option (msg_id) = 26006; }
