// ID: 24001~24099
syntax = "proto3";
option go_package = "hy_client/pb";
package galaxy.protocol;

import "msg_options.proto";
import "role.proto";

message PMahongRuleInfo {
    int32 game_mode = 1; // 游戏模式
    int32 play_turn = 2; // 局数
    int32 max_fan = 3; // 最大番数
    int32 max_player = 4; // 游戏人数
}

message ReqMahongCreateRoom {
    option (msg_id) = 24001;
    PMahongRuleInfo rule = 1;
}

message RspMahongCreateRoom {
    option (msg_id) = 24002;
	int64 room_id = 1;
}

message ReqMahongJoinRoom {
    option (msg_id) = 24003;
    int64 room_id = 1;
    int32 identify = 2;
}

message RspMahongJoinRoom {
    option (msg_id) = 24004;
    int64 room_id = 1;
}

message ReqMahongOperate {
    option (msg_id) = 24005;
    int32 cmd = 1; // 命令类型
    int32 val = 2;
}

message ReqMahongSetReady {
    option (msg_id) = 24006;
    int32 ready = 1;
}

message NotfiyMahongGameStart {
    option (msg_id) = 24007;
	int32 die_point = 1; // 筛子点数
	int32 game_count    = 2;     // 游戏局数
}

message PMahongKongInfo {
	int32 card     = 1;
	int32 kong_type = 2;
}

message PMahongMbrCardInfo {
    string role_id = 1;
	repeated int32 holders = 2; // 手牌
	repeated int32 pong = 3; // 碰牌
	repeated PMahongKongInfo kong = 4; // 杠牌
	int32 draw  = 5; // 摸牌
	repeated int32 out_card = 6; // 已出的牌
}

message PMahongTableCardInfo {
	int32 total = 1; // 总的牌
    int32 left = 2; // 剩下的牌
}

message NotifyMahongSeatCardInfo {
    option (msg_id) = 24008;
    repeated PMahongMbrCardInfo mbr_card = 1;
    PMahongTableCardInfo table_card = 2;
}

message PMahongMemberInfo{
	PRolePublic info = 1;
    int32 seat_index = 2;
    repeated int32 identify = 3;
    bool is_ready = 4;
}

message PMahongRoomInfo {
	int64 room_id = 1;
	PMahongRuleInfo rule = 2;
	int64 start_time = 3;
	repeated PMahongMemberInfo mbrs = 4;
}

message NotifyMahongRoomInfo {
    option (msg_id) = 24009;
    PMahongRoomInfo room_info = 1;
}

message NotifyMahongJoinRoom {
    option (msg_id) = 24010;
    PMahongMemberInfo mbr = 1;
}

message PMahongCommand {
    int32 cmd = 1; // 命令类型
    int32 val = 2;
    string source = 3;
    string data = 4;
}

// 下发某个玩家的操作
message NotifyMahongOperate {
    option (msg_id) = 24011;
    string role_id = 1;
    PMahongCommand cmd = 2;
}

message NotifyMahongOperateRevert {
    option (msg_id) = 24012;
    string role_id = 1;
    PMahongCommand cmd = 2;
}

message PMahongWinInfo {
    int32 win_card = 1;
    repeated int32 card_models = 2;
    int32 win_model = 3; // 胡牌模式（自摸，天胡，杠上花等）
    int32 fan = 4; // 番数
    int64 win_time = 5; // 胡牌时间
}

message PMahongLoseInfo {
    int32 lose_card = 1;
    int32 lose_mode = 2; // 放炮模式（杠上炮等）
    int64 lose_time = 3; // 放炮时间
}

message PMahongGameStat {
    string role_id = 1;
    PMahongMbrCardInfo card_info = 2;
    repeated PMahongWinInfo win_info = 3;
    repeated PMahongLoseInfo lose_info = 4;
    int32 score = 5; // 得分
}

message PMahongRoomStat {
    string role_id = 1;
	int32 draw_win = 2;// 自摸次数
	int32 discard_win = 3; // 接炮次数
	int32 discard_lose = 4; // 点炮次数
	int32 check_lose = 5; // 查叫次数
	int32 total_score = 6; // 总得分
    repeated PMahongKongInfo kongs = 7;
}

message NotfiyMahongRoomEnd {
    option (msg_id) = 24013;
	repeated PMahongRoomStat stats = 1; // 统计信息
}

message NotifyMahongGameEnd {
    option (msg_id) = 24014;
	int32 games  = 1; // 局数
	repeated PMahongGameStat stats = 2;
}

message NotifyMahongTurnSeat {
    option (msg_id) = 24015;
	int32 turn = 1;
}

message PMahongDingqueInfo {
	string role_id = 1;
	int32 dq_suit = 2;
}

message NotifyMahongDingqueFinish {
    option (msg_id) = 24016;
    repeated PMahongDingqueInfo dingque = 1;
}

message NotifyMahongMbrReady {
    option (msg_id) = 24017;
    string role_id = 1;
    bool ready = 2;
}

// 通知玩家合法的操作
message NotifyMahongValidCmd {
    option (msg_id) = 24018;
    repeated PMahongValidCommand cmds = 1;
}

message PMahongValidCommand {
    int32 cmd = 1; // 命令类型
    repeated int32 vals = 2;
}

message NotifyMahongTimeout {
    option (msg_id) = 24019;
    int64 timeout = 1;
}
