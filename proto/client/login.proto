// ID: 10001~10099
syntax = "proto3";
option go_package = "hy_client/pb";
package galaxy.protocol;

import "msg_options.proto";

// 握手协议，玩家登录的第一个协议
message ReqHandShake{
   option (msg_id) = 10001;
   string account_uid = 1; // 账号
}

message RspHandShake{
   option (msg_id) = 10002;
   string account_uid = 1; // 账号
   int64 role_id = 2; // 玩家id
}

// 登录协议
message ReqAccountLogin {
    option (msg_id) = 10003;
    int64 role_id = 1; // 玩家id
    string client_info =2; // 客户端信息（获取的设备名称，型号等，json格式）
}

message RspAccountLogin {
    option (msg_id) = 10004;
    bool first_login = 1; // 是否是第一次登录
    int64 role_id = 2;
}

message ReqAccountLogout {
    option (msg_id) = 10005;
    string reason = 1; // 登出原因
}
