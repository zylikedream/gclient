// ID: 23001~23099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";

// ==================== 枚举 ====================

enum FlowerState {
    FLOWER_UNLOCKED   = 0;
    FLOWER_BREEDING   = 1;
    FLOWER_BREED_DONE = 2;
    FLOWER_HARVESTED  = 3;
}

// ==================== 数据结构 ====================

message PFlowerInfo {
    int32 flower_id = 1;
    FlowerState state = 2;
    int64 state_time = 3;
    int32 level = 4;        // 当前等级
    int32 break_stage = 5;  // 突破阶段
}

// ==================== Req / Rsp ====================

// 鲜花信息 (23001)
message ReqFlowerInfo {
    option (msg_id) = 23001;
}
message RspFlowerInfo {
    option (msg_id) = 23002;
    repeated PFlowerInfo flowers = 1;
}

// 开始育种 (23003)
message ReqFlowerStartBreed {
    option (msg_id) = 23003;
    int32 flower_id = 1;
}
message RspFlowerStartBreed {
    option (msg_id) = 23004;
    PFlowerInfo flower = 1;
}

// 完成育种 (23005)
message ReqFlowerFinishBreed {
    option (msg_id) = 23005;
    int32 flower_id = 1;
}
message RspFlowerFinishBreed {
    option (msg_id) = 23006;
    PFlowerInfo flower = 1;
}

// 升级鲜花 (23007)
message ReqFlowerUpgrade {
    option (msg_id) = 23007;
    int32 flower_id = 1;
}
message RspFlowerUpgrade {
    option (msg_id) = 23008;
    PFlowerInfo flower = 1;
}

// 突破鲜花 (23009)
message ReqFlowerBreak {
    option (msg_id) = 23009;
    int32 flower_id = 1;
}
message RspFlowerBreak {
    option (msg_id) = 23010;
    PFlowerInfo flower = 1;
}
