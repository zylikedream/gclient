// ID: 26001~26099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";
import "bag.proto";

// ==================== 数据结构 ====================

message PResidentOrderSlot {
    int32 slot_id = 1;
    int32 position = 2;
    int32 resident_id = 3;
    string resident_name = 4;
    string resident_desc = 5;
    repeated PGoodInfo demands = 6;
    repeated PGoodInfo reward = 7;
    int64 cool_down_end = 8;
}

message PResidentOrderMilestone {
    int32 id = 1;
    int32 need_count = 2;
    bool claimed = 3;
}

// ==================== Req / Rsp ====================

// 订单信息 (26001)
message ReqResidentOrderInfo { option (msg_id) = 26001; }
message RspResidentOrderInfo {
    option (msg_id) = 26002;
    repeated PResidentOrderSlot slots = 1;
    int32 completed_count = 2;
    repeated PResidentOrderMilestone milestones = 3;
}

// 提交订单 (26003)
message ReqResidentOrderSubmit { option (msg_id) = 26003; int32 slot_id = 1; }
message RspResidentOrderSubmit {
    option (msg_id) = 26004;
    PResidentOrderSlot slot = 1;
    int32 completed_count = 2;
}

// 领取里程碑奖励 (26005)
message ReqResidentOrderClaimMilestone { option (msg_id) = 26005; int32 id = 1; }
message RspResidentOrderClaimMilestone { option (msg_id) = 26006; }
