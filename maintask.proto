// ID: 25001~25099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";

enum MainTaskStatus {
    MAIN_TASK_IN_PROGRESS = 0;
    MAIN_TASK_CLAIMABLE = 1;
    MAIN_TASK_FINISHED = 2;
}

message PMainTaskInfo {
    int32 task_id = 1;
    int32 progress = 2;
    MainTaskStatus status = 3;
}

message ReqMainTaskInfo {
    option (msg_id) = 25001;
}

message RspMainTaskInfo {
    option (msg_id) = 25002;
    PMainTaskInfo task = 1;
}

message ReqClaimMainTask {
    option (msg_id) = 25003;
}

message RspClaimMainTask {
    option (msg_id) = 25004;
    PMainTaskInfo task = 1;
}

message NotifyMainTaskUpdate {
    option (msg_id) = 25005;
    PMainTaskInfo task = 1;
}
