// ID: 27001~27099
syntax = "proto3";
option go_package="./pb;pb";
package galaxy.protocol;

import "msg_options.proto";
import "role.proto";

// 搜索玩家 (27001)
message ReqFriendSearchPlayer {
    option (msg_id) = 27001;
    string name = 1;
}
message RspFriendSearchPlayer {
    option (msg_id) = 27002;
    repeated PPlayerInfo players = 1;
}
message PPlayerInfo {
    PRolePublic player_info = 1;
    int32       relation    = 2;  // 0=自己 1=可申请 2=已申请 3=已是好友
}

// 发送申请 (27003)
message ReqFriendSendRequest {
    option (msg_id) = 27003;
    repeated int64 target_ids = 1;
}
message RspFriendSendRequest {
    option (msg_id) = 27004;
    repeated PFriendInfo friends = 1;
}

// 同意申请 (27005)
message ReqFriendAcceptRequest {
    option (msg_id) = 27005;
    repeated int64 from_ids = 1;
}
message RspFriendAcceptRequest {
    option (msg_id) = 27006;
    repeated PFriendInfo friends = 1;
}

// 拒绝申请 (27007)
message ReqFriendRejectRequest {
    option (msg_id) = 27007;
    repeated int64 from_ids = 1;
}
message RspFriendRejectRequest {
    option (msg_id) = 27008;
}

// 好友列表 (27009)
message ReqFriendList {
    option (msg_id) = 27009;
}
message RspFriendList {
    option (msg_id) = 27010;
    int32 total = 1;
    int32 limit = 2;
    repeated PFriendInfo friends = 3;
}
message PFriendInfo {
    PRolePublic player_info = 1;
    int64       friend_since = 2;
}

// 申请列表 (27011)
message ReqFriendApplyList {
    option (msg_id) = 27011;
}
message RspFriendApplyList {
    option (msg_id) = 27012;
    repeated PApplyInfo incoming = 1;
    repeated PApplyInfo outgoing = 2;
}
message PApplyInfo {
    PRolePublic player_info = 1;
    int64       apply_at    = 2;
    int32       status      = 3;  // 0=待处理 1=已同意 2=已拒绝
}

// 删除好友 (27013)
message ReqFriendRemove {
    option (msg_id) = 27013;
    int64 target_id = 1;
}
message RspFriendRemove {
    option (msg_id) = 27014;
}

// 通知：收到新的好友申请 (27015)
message NotifyFriendNewRequest {
    option (msg_id) = 27015;
    PApplyInfo apply_info = 1;
}

// 通知：新增好友 (27016)
message NotifyNewFriend {
    option (msg_id) = 27016;
    PFriendInfo friend_info = 1;
}
